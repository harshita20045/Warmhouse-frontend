<!-- Header -->
<header>
  <div class="logo">Smart SCM</div>
  <div class="header-icons">
    <i class="fas fa-bell" id="notificationBell"></i>
    <i class="fas fa-cog"></i>
    <div class="profile-dropdown">
      <i class="fas fa-user-circle" id="profileIcon"></i>
      <div class="dropdown-menu" id="profileMenu">
        <a href="#">Profile</a>
        <a href="#">Settings</a>
        <a href="#">Logout</a>
      </div>
    </div>
  </div>
</header>

<div style="display:flex; flex:1;">
  <!-- Sidebar -->
  <nav class="sidebar">
    <a routerLink="/main/dashboard" routerLinkActive="active">
      <i class="fas fa-tachometer-alt"></i> Dashboard
    </a>
    <a routerLink="/main/items" routerLinkActive="active">
      <i class="fas fa-tachometer-alt"></i> Items
    </a>
    <a routerLink="/main/categories" routerLinkActive="active">
      <i class="fas fa-tags"></i> Categories
    </a>
    <a routerLink="/main/warehouses" routerLinkActive="active">
      <i class="fas fa-warehouse"></i> Warehouses
    </a>

    <a routerLink="/main/inventory" routerLinkActive="active">
      <i class="fas fa-boxes"></i> Inventory
    </a>

    <a routerLink="/main/vendors" routerLinkActive="active">
      <i class="fas fa-truck"></i> Vendors
    </a>

    <a routerLink="/orders" routerLinkActive="active">
      <i class="fas fa-shopping-cart"></i> Orders
    </a>

    <a routerLink="/analytics" routerLinkActive="active">
      <i class="fas fa-chart-line"></i> Analytics
    </a>

    <a routerLink="/reports" routerLinkActive="active">
      <i class="fas fa-file-alt"></i> Reports
    </a>
  </nav>

  <!-- Main Dashboard -->
  <main>

    <router-outlet></router-outlet>
  </main>
</div>
