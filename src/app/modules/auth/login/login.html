<section class="hero">
    <div class="login-container">
      <!-- Logo -->
      <div class="login-logo">
        <!-- <img src="logo-placeholder.png" alt="Company Logo"> -->
      </div>

      <!-- Login Form -->
     <form (ngSubmit)="onLogin()" #loginForm="ngForm">
  <div class="form-group">
    <input type="text" name="username" [(ngModel)]="username" placeholder="Username or Email" required>
    <i class="fas fa-user"></i>
  </div>
  <div class="form-group">
    <input type="password" name="password" [(ngModel)]="password" placeholder="Password" required>
    <i class="fas fa-lock"></i>
  </div>
  <button type="submit" class="cta-button" [disabled]="!loginForm.valid">Login</button>

  <div class="secondary-actions">
    <a href="#">Forgot Password?</a>
    <a href="#">Sign Up</a>
  </div>


</form>
